<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — ReviewLift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1A1A18;
      --cream: #EAE7DC;
      --accent: #C8A96E;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container { text-align: center; max-width: 480px; }
    .code { font-size: 6rem; font-weight: 800; color: var(--accent); font-family: 'Syne', sans-serif; }
    h1 { font-size: 1.5rem; margin: 16px 0 8px; }
    p { color: rgba(234,231,220,0.55); margin-bottom: 24px; }
    .btn { display: inline-block; background: var(--accent); color: #1A1A18; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn">Go home →</a>
  </div>
</body>
</html>
