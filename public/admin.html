<!DOCTYPE html>
<html>

<head>

<title>Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:500px;
margin:auto;
border-radius:10px;
}

input{
width:80%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Business</h2>

<input id="name" placeholder="Business name">

<input id="email" placeholder="Business email">

<input id="review" placeholder="Google review link">

<input id="password" placeholder="Dashboard password">

<button onclick="create()">Create</button>

<p id="result"></p>

</div>

<script>

async function create(){

 const name=document.getElementById("name").value
 const email=document.getElementById("email").value
 const review=document.getElementById("review").value
 const password=document.getElementById("password").value

 const res=await fetch("/create-business",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name,email,review,password})
 })

 const data=await res.json()

 document.getElementById("result").innerText=
 `Business created! Slug: ${data.slug}`

}

</script>

</body>

</html>
