<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Business</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Create Your Business</h2>

  <input id="name" placeholder="Business name">
  <input id="email" placeholder="Business email">
  <input id="review" placeholder="Google review link">
  <input id="password" placeholder="Dashboard password">

  <button onclick="createBusiness()">Create Business</button>
  <p id="result"></p>

  <div id="plans" style="display:none">
    <h3>Select Plan</h3>
    <div class="plan">
      <h4>Starter</h4>
      <p>$19 / month - Basic features</p>
      <button onclick="subscribe('starter')">Select</button>
    </div>
    <div class="plan">
      <h4>Pro</h4>
      <p>$49 / month - Premium features + analytics + SMS automation</p>
      <button onclick="subscribe('pro')">Select</button>
    </div>
  </div>
</div>

<script>
let currentSlug = "";

async function createBusiness(){
  const name=document.getElementById("name").value;
  const email=document.getElementById("email").value;
  const review=document.getElementById("review").value;
  const password=document.getElementById("password").value;

  const res = await fetch("/create-business",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,email,review,password})
  });
  const data = await res.json();
  if(data.success){
    currentSlug=data.slug;
    sessionStorage.setItem("currentSlug",currentSlug);
    document.getElementById("plans").style.display="block";
    document.getElementById("result").innerText="Business created!";
  } else{
    document.getElementById("result").innerText="Error creating business";
  }
}

async function subscribe(plan){
  const res = await fetch("/create-checkout",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({slug:currentSlug,plan})
  });
  const data = await res.json();
  window.location=data.url;
}
</script>

</body>
</html>
