<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Feedback — ReviewLift</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/css/bad.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>
  <div class="container">
    <span class="icon">💬</span>
    <h2>We're sorry to hear that</h2>
    <p>Tell us what happened and we'll do our best to make it right. Your feedback is private.</p>
    <textarea id="message" placeholder="What could we have done better?"></textarea>
    <button class="btn-full" onclick="send()">Send Feedback</button>
  </div>

  <script>
    const slug = window.slug;
    
    async function send(){
      const message = document.getElementById("message").value;
      const btn = document.querySelector('button[onclick="send()"]');
      btn.disabled = true;
      btn.textContent = 'Sending...';
    
      await fetch("/feedback",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ business:slug, message })
      });
      window.location = "/thanks";
    }
  </script>
</body>
</html>
