<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Subscription Cancelled — ReviewLift</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .container { max-width: 440px; text-align: center; }
    .icon { font-size: 2.8rem; display: block; margin-bottom: 20px; }
    h2 { margin-bottom: 8px; }
    p { color: var(--cream-dim); margin-bottom: 28px; }
    .btn-row { justify-content: center; }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">↩</span>
    <h2>Subscription not completed</h2>

    <div class="btn-row" style="display:flex;gap:12px;justify-content:center;">
      <a href="/admin" style="display:inline-flex;align-items:center;padding:12px 22px;background:var(--accent);color:#1A1A18;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.9rem;">View Plans</a>
      <a href="/" style="display:inline-flex;align-items:center;padding:12px 22px;background:transparent;color:var(--cream-dim);border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.9rem;">Go Home</a>
    </div>
  </div>
