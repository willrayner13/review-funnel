<script>
// Navbar JavaScript - Enhanced for responsive behavior
(function() {
  const hamburger = document.getElementById('rlNavHamburger');
  const drawer = document.getElementById('rlNavDrawer');
  
  if (!hamburger || !drawer) return;
  
  window.toggleRlNav = function() {
    hamburger.classList.toggle('open');
    drawer.classList.toggle('open');
    if (drawer.classList.contains('open')) {
      document.body.classList.add('drawer-open');
      document.body.style.overflow = 'hidden';
    } else {
      document.body.classList.remove('drawer-open');
      document.body.style.overflow = '';
    }
  };
  
  window.closeRlNav = function() {
    hamburger.classList.remove('open');
    drawer.classList.remove('open');
    document.body.classList.remove('drawer-open');
    document.body.style.overflow = '';
  };
  
  hamburger.addEventListener('click', toggleRlNav);
  
  // Close drawer when clicking outside
  document.addEventListener('click', function(e) {
    if (drawer.classList.contains('open') && !drawer.contains(e.target) && !hamburger.contains(e.target)) {
      closeRlNav();
    }
  });
  
  // Close on escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && drawer.classList.contains('open')) {
      closeRlNav();
    }
  });
  
  // Close drawer on window resize if open (prevents layout issues)
  let resizeTimeout;
  window.addEventListener('resize', function() {
    if (drawer.classList.contains('open')) {
      // Debounce to avoid multiple calls
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(function() {
        if (window.innerWidth > 900) {
          closeRlNav();
        }
      }, 250);
    }
  });
})();
</script>
