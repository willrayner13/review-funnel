<script>
// Navbar JavaScript
(function() {
  const hamburger = document.getElementById('rlNavHamburger');
  const drawer = document.getElementById('rlNavDrawer');
  
  if (!hamburger || !drawer) return;
  
  window.toggleRlNav = function() {
    hamburger.classList.toggle('open');
    drawer.classList.toggle('open');
    document.body.style.overflow = drawer.classList.contains('open') ? 'hidden' : '';
  };
  
  window.closeRlNav = function() {
    hamburger.classList.remove('open');
    drawer.classList.remove('open');
    document.body.style.overflow = '';
  };
  
  hamburger.addEventListener('click', toggleRlNav);
  
  // Close drawer when clicking outside (optional)
  document.addEventListener('click', function(e) {
    if (drawer.classList.contains('open') && !drawer.contains(e.target) && !hamburger.contains(e.target)) {
      closeRlNav();
    }
  });
  
  // Close on escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && drawer.classList.contains('open')) {
      closeRlNav();
    }
  });
})();
</script>
