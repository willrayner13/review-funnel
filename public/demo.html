<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReviewLift Demo — See it in action</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/css/funnel.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <style>
    body {
      background: #1A1A18;
      padding-top: 70px;
    }
    .demo-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--accent, #C8A96E);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      z-index: 100;
    }
    .demo-banner span { color: #1A1A18; font-size: 0.85rem; font-weight: 500; }
    .demo-banner .demo-cta {
      background: #1A1A18;
      color: var(--accent, #C8A96E);
      padding: 8px 20px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .demo-input-section {
      text-align: center;
      margin-bottom: 32px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .demo-input-section label {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cream-dim);
      display: block;
      margin-bottom: 12px;
    }
    .demo-input-section input {
      width: 100%;
      padding: 14px 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--cream);
      font-size: 1rem;
      text-align: center;
    }
    .iphone-mockup {
      background: #000;
      border-radius: 44px;
      padding: 12px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
      max-width: 380px;
      margin: 0 auto;
    }
    .iphone-screen {
      background: #1A1A18;
      border-radius: 32px;
      overflow: hidden;
      min-height: 580px;
      position: relative;
    }
    .dynamic-island {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 32px;
      background: #0A0A0A;
      border-radius: 24px;
      z-index: 10;
    }
    .iphone-content {
      padding: 60px 16px 32px;
      min-height: 580px;
    }
    .demo-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(200,169,110,0.2);
      color: var(--accent);
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 20px;
      z-index: 20;
      font-weight: 600;
    }
    .demo-note {
      text-align: center;
      margin-top: 24px;
      font-size: 0.75rem;
      color: rgba(234,231,220,0.3);
    }
  </style>
</head>
<body>

<div class="demo-banner">
  <span>👆 This is a live demo — this is what your customers would see</span>
  <a href="/admin" class="demo-cta">Get this for my business →</a>
</div>

<div style="margin-top: 20px; padding: 0 20px;">
  <div class="demo-input-section">
    <label>See how it looks for your business</label>
    <input type="text" id="businessNameInput" placeholder="Type your business name..." value="The Coffee House">
  </div>

  <div class="iphone-mockup">
    <div class="iphone-screen">
      <div class="dynamic-island"></div>
      <div class="demo-badge">DEMO</div>
      <div class="iphone-content" id="funnelContainer"></div>
    </div>
  </div>
  
  <p class="demo-note">Try tapping the stars — this is exactly how it works in the live version</p>
</div>

<script src="/js/funnel-loader.js"></script>
<script>
  // Load the funnel HTML template
  fetch('/funnel/funnel-template.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('funnelContainer').innerHTML = html;
      
      // Get business name from input
      const nameInput = document.getElementById('businessNameInput');
      let currentBusinessName = nameInput.value;
      
      // Update business name display when input changes
      nameInput.addEventListener('input', function() {
        currentBusinessName = this.value.trim() || "Your Business";
        updateBusinessNameInFunnel(currentBusinessName);
      });
      
      function updateBusinessNameInFunnel(name) {
        const bizTitle = document.querySelector('#funnelContainer #businessTitle');
        if (bizTitle) bizTitle.textContent = name;
        
        const headline = document.querySelector('#funnelContainer #mainHeadline');
        if (headline) {
          headline.textContent = `How was your experience at ${name}?`;
        }
      }
      
      // Initialize demo mode
      initFunnel('demo', {
        businessName: currentBusinessName,
        slug: 'demo-business',
        template: 'classic',
        accentColor: '#C8A96E'
      });
      
      // Set initial business name
      setTimeout(() => updateBusinessNameInFunnel(currentBusinessName), 100);
    });
</script>
</body>
</html>
