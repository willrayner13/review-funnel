<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Try the ReviewLift review funnel demo. See how happy customers go to Google and unhappy feedback stays private.">
  <meta name="keywords" content="reviewlift demo, review funnel example, google review funnel test, free review tool demo">
  <link rel="canonical" href="https://www.reviewlift.app/demo">
  <title>ReviewLift Demo — See it in action</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/css/funnel.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body id="demoBody">

<div class="demo-banner">
  <span>👆 This is a live demo — this is what your customers would see</span>
  <a href="/admin" class="demo-cta">Get this for my business →</a>
</div>

<div style="margin-top: 80px; padding: 0 20px;">
  <div class="demo-input-section">
    <label>See how it looks for your business</label>
    <input type="text" id="demoInput" placeholder="Type your business name..." oninput="updateDemoBusinessName()">
  </div>

  <div class="iphone-mockup">
    <div class="iphone-screen iphone-glass">
      <div class="dynamic-island"></div>
      <div class="iphone-content" id="demoFunnelContent">
        <!-- Funnel content will be duplicated here via JS -->
      </div>
    </div>
  </div>
</div>

<script>
// Demo page - replicates funnel functionality for preview
let demoSlug = 'demo-business';

// Apply funnel customisation for demo
function applyDemoCustomisation() {
  const template = 'classic';
  const accentColor = '#C8A96E';
  document.body.classList.add(`template-${template}`);
  document.documentElement.style.setProperty('--accent', accentColor);
}

// Update business name in demo
function updateDemoBusinessName() {
  const input = document.getElementById('demoInput');
  const name = input.value.trim();
  const businessTitle = document.getElementById('demoBusinessTitle');
  if (businessTitle) {
    businessTitle.textContent = name || 'Your Business';
  }
}

// Load funnel content into demo
async function loadDemoFunnel() {
  const container = document.getElementById('demoFunnelContent');
  // Fetch the funnel HTML structure
  const response = await fetch('/index.html');
  const html = await response.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const funnelContent = doc.querySelector('.funnel-card').cloneNode(true);
  
  // Remove back button from demo
  const backBtn = funnelContent.querySelector('#backBtn');
  if (backBtn) backBtn.style.display = 'none';
  
  // Modify IDs to avoid conflicts
  funnelContent.querySelectorAll('[id]').forEach(el => {
    if (el.id && !el.id.includes('demo')) {
      el.id = 'demo_' + el.id;
    }
  });
  
  container.innerHTML = '';
  container.appendChild(funnelContent);
  
  // Override JavaScript functions for demo (simulate, don't actually call APIs)
  window.demoMode = true;
  window.slug = demoSlug;
  window.businessName = 'Your Business';
  window.reviewLink = '#';
  window.funnelTemplate = 'classic';
  window.funnelAccentColor = '#C8A96E';
  
  // Load the funnel script logic for demo
  const script = document.createElement('script');
  script.src = '/js/funnel.js';
  document.body.appendChild(script);
  
  // Override API calls to simulate demo
  setTimeout(() => {
    if (typeof window.fetch === 'function') {
      const originalFetch = window.fetch;
      window.fetch = function(url, options) {
        if (url.includes('/suggest-review/')) {
          return Promise.resolve({
            json: () => Promise.resolve({ suggestion: 'Great service! Will definitely come back. The team was friendly and professional.' })
          });
        }
        if (url.includes('/rating') || url.includes('/positive') || url.includes('/feedback')) {
          return Promise.resolve({ json: () => Promise.resolve({ success: true }) });
        }
        if (url.includes('/transcribe-voice/')) {
          return Promise.resolve({
            json: () => Promise.resolve({ sentiment: 'positive', transcription: 'This is a demo voice recording. The service was excellent!' })
          });
        }
        return originalFetch(url, options);
      };
    }
  }, 500);
  
  // Set business name from input
  const input = document.getElementById('demoInput');
  if (input.value.trim()) {
    const bizTitle = document.getElementById('demoBusinessTitle');
    if (bizTitle) bizTitle.textContent = input.value.trim();
  }
  
  // Add a small indicator that this is a demo
  const demoIndicator = document.createElement('div');
  demoIndicator.style.cssText = 'position:absolute; top:8px; right:12px; background:rgba(200,169,110,0.2); color:var(--accent); font-size:0.6rem; padding:2px 8px; border-radius:20px; z-index:20;';
  demoIndicator.textContent = 'DEMO';
  funnelContent.appendChild(demoIndicator);
}

applyDemoCustomisation();
loadDemoFunnel();

window.updateDemoBusinessName = updateDemoBusinessName;
</script>

<!-- Also include the main funnel CSS for consistent styling -->
<link rel="stylesheet" href="/css/funnel.css">
</body>
</html>
