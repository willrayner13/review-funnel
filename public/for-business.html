<!DOCTYPE html>
<html>

<head>

<title>Business Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:700px;
margin:auto;
}

input{
padding:10px;
width:80%;
margin:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer;
}

ul{
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h2>Business Dashboard Login</h2>

<input id="slug" placeholder="Business Slug">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="dashboard" style="display:none">

<h3 id="bizName"></h3>

<h4>Metrics</h4>

<p>Visits: <span id="visits"></span></p>
<p>Positive: <span id="positive"></span></p>
<p>Negative: <span id="negative"></span></p>
<p>Review Clicks: <span id="reviews"></span></p>

<p>Conversion Rate: <span id="conversion"></span>%</p>
<p>Negative Rate: <span id="negRate"></span>%</p>

<canvas id="funnelChart"></canvas>

<h4>Your Review Link</h4>

<input id="reviewLink" readonly>

<br>

<button onclick="copyLink()">Copy Link</button>

<button onclick="openLink()">Open Link</button>

<h4>QR Code</h4>

<img id="qr">

<br>

<a id="qrDownload">Download QR</a>

<h3>Send SMS Review Request</h3>
<input id="customerPhone" placeholder="Customer phone number">
<button onclick="sendSMS()">Send SMS</button>
<button onclick="subscribe()">Subscribe</button>

<h4>Customer Feedback</h4>

<ul id="negativeList"></ul>

<h4>AI Feedback Insights</h4>

<button onclick="loadAI()">Generate Summary</button>

<p id="aiSummary"></p>

<h3>AI Review Reply</h3>
<textarea id="reviewText" placeholder="Paste review"></textarea>
<button onclick="generateReply()">Generate Reply</button>
<textarea id="replyOutput"></textarea>
<button onclick="copyReply()">Copy Reply</button>

</div>

</div>

<script>

async function login(){

 const slug=document.getElementById("slug").value
 const password=document.getElementById("password").value

 const res=await fetch("/verify-login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({slug,password})
 })

 const data=await res.json()

 if(data.success){
  loadDashboard(slug)
 }else{
  alert("Login failed")
 }

}

async function subscribe(){
  const slug = document.getElementById("slug").value
  const res = await fetch("/create-checkout",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({slug})
  })
  const data = await res.json()
  window.location = data.url
}

async function loadDashboard(slug){

 const res=await fetch("/stats/"+slug)
 const stats=await res.json()

 document.getElementById("visits").innerText=stats.visits
 document.getElementById("positive").innerText=stats.positive
 document.getElementById("negative").innerText=stats.negative
 document.getElementById("reviews").innerText=stats.reviews
 document.getElementById("conversion").innerText=stats.conversion_rate
 document.getElementById("negRate").innerText=stats.negative_rate

 document.getElementById("dashboard").style.display="block"

 document.getElementById("bizName").innerText=
 slug.replace(/-/g," ").toUpperCase()

 const reviewLink = window.location.origin + "/r/" + slug
 document.getElementById("reviewLink").value = reviewLink

 const qrUrl = "/qr-download/"+slug

 document.getElementById("qr").src = qrUrl
 document.getElementById("qrDownload").href = qrUrl

 loadChart(stats)

 const feedbackRes = await fetch("/feedback-messages/"+slug)
 const messages = await feedbackRes.json()

 const list = document.getElementById("negativeList")
 list.innerHTML=""

 messages.forEach(m=>{

 const li=document.createElement("li")

 const date=new Date(m.created_at).toLocaleString()

 li.innerText=`[${date}] ${m.message}`

 list.appendChild(li)

 })

}

function loadChart(stats){

 const ctx=document.getElementById("funnelChart")

 new Chart(ctx,{
  type:"bar",
  data:{
   labels:["Visits","Positive","Negative","Review Clicks"],
   datasets:[{
    label:"Review Funnel",
    data:[
     stats.visits,
     stats.positive,
     stats.negative,
     stats.reviews
    ]
   }]
  }
 })

}

function copyLink(){

 const link=document.getElementById("reviewLink")

 link.select()

 navigator.clipboard.writeText(link.value)

 alert("Link copied")

}

function openLink(){

 window.open(
 document.getElementById("reviewLink").value,
 "_blank"
 )

}

async function sendSMS(){
  const phone = document.getElementById("customerPhone").value
  const slug = document.getElementById("slug").value

  const res = await fetch("/send-sms",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({phone, slug})
  })

  const data = await res.json()
  if(data.success) alert("SMS sent!")
  else alert("Error: "+data.error)
}

async function loadAI(){

 const slug=document.getElementById("slug").value

 const res=await fetch("/ai-feedback/"+slug)

 const data=await res.json()

 document.getElementById("aiSummary").innerText=data.summary

}

async function generateReply(){
  const review = document.getElementById("reviewText").value
  const res = await fetch("/generate-reply",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({review})
  })
  const data = await res.json()
  document.getElementById("replyOutput").value = data.reply
}
function copyReply(){
  const text = document.getElementById("replyOutput")
  text.select()
  navigator.clipboard.writeText(text.value)
  alert("Reply copied!")
}

</script>

</body>

</html>
