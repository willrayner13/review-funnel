<!DOCTYPE html>
<html>
<head>
<title>Business Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">
<h3 id="bizName"></h3>

<h4>Metrics</h4>
<p>Visits: <span id="visits"></span></p>
<p>Positive: <span id="positive"></span></p>
<p>Negative: <span id="negative"></span></p>
<p>Review Clicks: <span id="reviews"></span></p>

<h4>Rating Distribution</h4>
<canvas id="ratingChart"></canvas>

<h4>Your Review Link</h4>
<input id="reviewLink" readonly>
<button onclick="copyLink()">Copy</button>

<h4>Embed Review Button</h4>
<textarea id="embedCode" readonly style="width:100%;height:70px"></textarea>

<h4>QR Code</h4>
<img id="qr">
<br>
<a id="qrDownload">Download QR</a>

<h3>Send SMS Review Request</h3>
<input id="customerPhone" placeholder="Customer phone">
<button onclick="sendSMS()">Send SMS</button>

<h3>Send Email Review Request</h3>

<input id="customerEmail" placeholder="Customer email">

<button onclick="sendEmail()">Send Email</button>

<h4>Customer Feedback</h4>
<ul id="negativeList"></ul>
</div>

<button onclick="logout()">Logout</button>

<button onclick="billing()">Manage Subscription</button>

<h3>AI Review Reply Generator</h3>

<textarea id="reviewText" placeholder="Paste customer review here"></textarea>

<button onclick="generateReply()">Generate Reply</button>

<textarea id="aiReply" placeholder="AI reply will appear here"></textarea>

<script>
let slug;

async function checkSession(){

const res = await fetch("/session")
const data = await res.json()

if(!data.loggedIn){

window.location="/login"
return

}

slug = data.slug

load()

}

checkSession()

async function load(){
  const res=await fetch("/stats/"+slug);
  const stats=await res.json();
  document.getElementById("bizName").innerText=slug;
  document.getElementById("visits").innerText=stats.visits;
  document.getElementById("positive").innerText=stats.positive;
  document.getElementById("negative").innerText=stats.negative;
  document.getElementById("reviews").innerText=stats.reviews;
  const reviewLink=window.location.origin+"/r/"+slug;
  document.getElementById("reviewLink").value=reviewLink;
  document.getElementById("embedCode").value =
`<a href="${reviewLink}" target="_blank">Leave us a review</a>`
  const qrUrl="/qr-download/"+slug;
  document.getElementById("qr").src=qrUrl;
  document.getElementById("qrDownload").href=qrUrl;

const list = document.getElementById("negativeList")
list.innerHTML = ""

stats.feedback.forEach(f => {

  const li = document.createElement("li")
  li.innerText = f

  list.appendChild(li)

})

  // Chart
  const ctx=document.getElementById('ratingChart').getContext('2d');
  new Chart(ctx,{type:'bar',data:{labels:['1','2','3','4','5'],datasets:[{label:'Ratings',data:[stats.rating_distribution[1],stats.rating_distribution[2],stats.rating_distribution[3],stats.rating_distribution[4],stats.rating_distribution[5]],backgroundColor:'#EAE7DC'}]},options:{scales:{y:{beginAtZero:true}}}});
}

function copyLink(){
  const link=document.getElementById("reviewLink");
  link.select();
  navigator.clipboard.writeText(link.value);
  alert("Link copied!");
}

async function sendSMS(){
  const phone=document.getElementById("customerPhone").value;
  const res=await fetch("/send-sms",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone,slug})});
  const data=await res.json();
  if(data.success) alert("SMS sent");
}

function logout(){
window.location="/logout"
}

async function billing(){

const res=await fetch("/billing-portal",{method:"POST"})
const data=await res.json()

window.location=data.url

}

async function generateReply(){

const review=document.getElementById("reviewText").value

const res=await fetch("/generate-reply",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({review})
})

const data=await res.json()

if(data.error){
alert(data.error)
return
}

document.getElementById("aiReply").value=data.reply

}

async function sendEmail(){

const email=document.getElementById("customerEmail").value

const res=await fetch("/send-email",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email})
})

const data=await res.json()

if(data.success){
alert("Email sent")
}

}


</script>

</body>
</html>
