<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review</title>
</head>
<body>

<h2>Leave a Review</h2>

<textarea id="message" placeholder="Write your review here"></textarea>
<br><br>
<button onclick="send()">Submit Review</button>

<script>
async function send() {
  const message = document.getElementById("message").value;
  const slug = window.location.pathname.split("/r/")[1]; // URL contains /r/:slug
  await fetch("/feedback", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ business: slug, message })
  });
  window.location.href = "/thanks.html";
}
</script>

</body>
</html>
