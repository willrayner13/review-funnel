<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>How was your experience?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/css/funnel.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body id="funnelBody">
  <div class="funnel-wrap" id="funnelContainer"></div>
  
  <script src="/js/funnel-loader.js"></script>
  <script>
    // Load the funnel HTML template
    fetch('/funnel/funnel-template.html')
      .then(res => {
        if (!res.ok) throw new Error('Failed to load funnel template');
        return res.text();
      })
      .then(html => {
        document.getElementById('funnelContainer').innerHTML = html;
        
        // Inject business data from server
        window.slug = window.serverSlug;
        window.businessName = window.serverBusinessName;
        window.reviewLink = window.serverReviewLink;
        window.funnelTemplate = window.serverFunnelTemplate;
        window.funnelAccentColor = window.serverFunnelAccentColor;
        window.funnelLogoUrl = window.serverFunnelLogoUrl;
        window.funnelHeadline = window.serverFunnelHeadline;
        window.funnelHappyLabel = window.serverFunnelHappyLabel;
        window.funnelUnhappyLabel = window.serverFunnelUnhappyLabel;
        window.funnelThankyouMessage = window.serverFunnelThankyouMessage;
        window.accountLapsed = window.isLapsed;
        
        // Initialize the funnel in live mode
        if (typeof initFunnel === 'function') {
          initFunnel('live');
        } else {
          console.error('funnel-loader.js not loaded');
        }
      })
      .catch(err => {
        console.error('Failed to load funnel:', err);
        document.getElementById('funnelContainer').innerHTML = '<div style="text-align:center;padding:40px;"><h2>Something went wrong</h2><p>Please try again later.</p></div>';
      });
  </script>
</body>
</html>
