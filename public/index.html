<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Feedback</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h2 id="businessTitle"></h2>
<p>Did you enjoy your visit today?</p>

<button class="yes" onclick="positive()">Yes</button>
<button class="no" onclick="showFeedback()">No</button>

<div id="ratingSection" style="display:none">
  <h3>Rate your experience</h3>
  <div id="stars">
    <span onclick="rate(1)">⭐</span>
    <span onclick="rate(2)">⭐</span>
    <span onclick="rate(3)">⭐</span>
    <span onclick="rate(4)">⭐</span>
    <span onclick="rate(5)">⭐</span>
  </div>
</div>

<div id="reviewSection" style="display:none">
  <h3>⭐ Thank you!</h3>
  <p>Would you like to leave a quick Google review?</p>
  <button onclick="leaveReview()">Leave Review</button>
</div>

<div id="feedbackBox" style="display:none">
  <h3>We're sorry to hear that</h3>
  <textarea id="message" placeholder="Tell us what went wrong"></textarea>
  <button onclick="sendFeedback()">Send Feedback</button>
</div>

<p class="small-text"><a href="/for-business.html">Powered by ReviewBoost</a></p>
</div>

<script>
const slug = window.slug;

function positive(){
  fetch("/positive",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({slug})});
  document.getElementById("ratingSection").style.display="block";
}

function showFeedback(){
  document.getElementById("feedbackBox").style.display="block";
}

function sendFeedback(){
  const message=document.getElementById("message").value;
  fetch("/feedback",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({business:slug,message})});
  alert("Thank you for your feedback!");
}

function leaveReview(){
  fetch("/review-click",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({slug})});
  window.location.href = window.reviewLink;
}

function rate(stars){
  fetch("/rating",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({slug,rating:stars})});
  if(stars>=4){
    document.getElementById("ratingSection").style.display="none";
    document.getElementById("reviewSection").style.display="block";
  } else{
    document.getElementById("ratingSection").style.display="none";
    document.getElementById("feedbackBox").style.display="block";
  }
}

document.getElementById("businessTitle").innerText=window.businessName;
</script>
</body>
</html>
