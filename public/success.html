<!-- Example: success.html -->
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Success</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
<h2>Thank you for subscribing!</h2>
<p>We are confirming your subscription...</p>
<div class="loader"></div>
<p id="status"></p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug") || sessionStorage.getItem("currentSlug");
if (!slug) { document.getElementById("status").innerText="No business info."; setTimeout(()=>window.location.href="/",3000);}
else{
async function checkSubscription(){
  const res=await fetch("/stats/"+slug);
  const data=await res.json();
  if(data.subscription_active) window.location.href="/for-business";
  else{document.getElementById("status").innerText="Checking subscription..."; setTimeout(checkSubscription,2000);}
}
checkSubscription();
}
</script>
</body>
</html>
