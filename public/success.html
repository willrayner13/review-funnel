<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription Confirmed — ReviewBoost</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .container { max-width: 460px; text-align: center; }
    .icon { font-size: 3rem; display: block; margin-bottom: 20px; animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both; }
    @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    h2 { margin-bottom: 8px; }
    p { color: var(--cream-dim); margin-bottom: 4px; }
    #status { color: var(--accent); font-size: 0.85rem; margin-top: 8px; min-height: 20px; }
    .loader-wrap { display: flex; justify-content: center; margin: 24px 0 8px; }
    .loader { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .manual-link { margin-top: 28px; }
    .manual-link a { font-size: 0.85rem; color: var(--accent); border: 1px solid rgba(200,169,110,0.3); padding: 10px 20px; border-radius: 8px; display: inline-block; transition: all 0.2s; }
    .manual-link a:hover { background: rgba(200,169,110,0.08); }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">🎉</span>
    <h2>You're all set!</h2>
    <p>We're confirming your subscription — just a moment.</p>
    <div class="loader-wrap"><div class="loader"></div></div>
    <p id="status">Verifying payment...</p>

    <!-- Fallback if polling takes too long -->
    <div class="manual-link" id="manualLink" style="display:none">
      <a href="/for-business">Go to my dashboard →</a>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("slug") || sessionStorage.getItem("currentSlug");

  // Show manual link after 10 seconds regardless — catches session issues
  setTimeout(() => {
    document.getElementById("manualLink").style.display = "block";
    document.getElementById("status").innerText = "Taking a moment — click below to continue.";
  }, 10000);

  if(!slug){
    document.getElementById("status").innerText = "No account info found.";
    document.getElementById("manualLink").style.display = "block";
  } else {
    // Also restore session from slug in URL so dashboard works
    // The server needs the session — we re-verify by hitting a lightweight endpoint
    let attempts = 0;
    async function checkSubscription(){
      attempts++;
      try {
        // Try stats endpoint — if session is valid it returns data
        const res = await fetch("/subscription-status/" + slug);
        const data = await res.json();
        if(data.subscription_active){
          document.getElementById("status").innerText = "✓ Confirmed! Redirecting to your dashboard...";
          document.querySelector(".loader").style.display = "none";
          setTimeout(() => window.location.href = "/for-business", 1200);
        } else if(attempts < 10) {
          document.getElementById("status").innerText = "Still confirming" + ".".repeat(attempts % 4);
          setTimeout(checkSubscription, 2500);
        } else {
          document.getElementById("status").innerText = "Stripe confirmed — click below to continue.";
          document.getElementById("manualLink").style.display = "block";
          document.querySelector(".loader").style.display = "none";
        }
      } catch(e) {
        if(attempts < 10) setTimeout(checkSubscription, 2500);
        else {
          document.getElementById("manualLink").style.display = "block";
          document.querySelector(".loader").style.display = "none";
        }
      }
    }
    checkSubscription();
  }
</script>
</body>
</html>
