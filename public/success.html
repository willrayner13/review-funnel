<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Trial Started — ReviewLift</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/css/success.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>
  <div class="container">
    <span class="icon">🎉</span>
    <h2>Your trial has started!</h2>
    <p class="sub-text">Setting up your dashboard — just a moment.</p>

    <div class="trial-info">
      <strong>What happens next:</strong><br>
      Your 14-day free trial starts today. No charge until day 15. You can cancel any time from your dashboard before the trial ends and you won't pay a penny.
    </div>

    <div class="loader-wrap"><div class="loader" id="spinner"></div></div>
    <p id="status">Activating your account...</p>

    <div class="manual-link" id="manualLink" style="display:none;">
      <a href="/for-business">Go to my dashboard →</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const urlSlug = params.get("slug");
    const storageSlug = sessionStorage.getItem("currentSlug");
    const slug = urlSlug || storageSlug;

    console.log("Checking subscription for slug:", slug);

    if (!slug) {
      document.getElementById("status").innerText = "Something went wrong — please sign in.";
      document.getElementById("spinner").style.display = "none";
      const ml = document.getElementById("manualLink");
      ml.style.display = "block";
      ml.querySelector("a").href = "/login";
      ml.querySelector("a").textContent = "Sign in to your dashboard →";
    } else {
      let attempts = 0;
      const maxAttempts = 30; // increased from 15

      async function tryActivate() {
        attempts++;
        try {
          console.log("Attempt", attempts, "- fetching /subscription-status/" + slug);
          const statusRes = await fetch("/subscription-status/" + slug + "?t=" + Date.now()); // cache-bust
          
          if (!statusRes.ok) {
            console.log("Response not OK:", statusRes.status);
            if (attempts < maxAttempts) {
              setTimeout(tryActivate, 3000);
            } else {
              document.getElementById("status").innerText = "Your account is ready!";
              document.getElementById("spinner").style.display = "none";
              document.getElementById("manualLink").style.display = "block";
            }
            return;
          }

          const statusData = await statusRes.json();
          console.log("Status data:", statusData);

          if (statusData.subscription_active) {
            try {
              await fetch("/restore-session/" + slug, { method: "POST" });
            } catch(e) {
              console.log("Session restore failed:", e);
            }
            document.getElementById("status").innerText = "✓ Account activated! Redirecting...";
            document.getElementById("spinner").style.display = "none";
            setTimeout(() => { window.location.href = "/for-business"; }, 1200);

          } else if (attempts < maxAttempts) {
            const dots = ".".repeat((attempts % 3) + 1);
            document.getElementById("status").innerText = "Confirming with Stripe" + dots;
            setTimeout(tryActivate, 3000);
          } else {
            document.getElementById("status").innerText = "Your account is ready!";
            document.getElementById("spinner").style.display = "none";
            document.getElementById("manualLink").style.display = "block";
          }
        } catch (e) {
          console.error("Fetch error:", e);
          if (attempts < maxAttempts) {
            setTimeout(tryActivate, 3000);
          } else {
            document.getElementById("spinner").style.display = "none";
            document.getElementById("manualLink").style.display = "block";
          }
        }
      }

      // Wait 5 seconds before first attempt — gives webhook time to fire
      setTimeout(tryActivate, 5000);
    }
  </script>
</body>
</html>
