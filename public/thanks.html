<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Thanks — ReviewLift</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .wrap { text-align: center; max-width: 420px; }
    .icon { font-size: 3.5rem; display: block; margin-bottom: 20px; animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both; }
    @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    h2 { margin-bottom: 10px; }
    p { color: var(--cream-dim); font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="icon">💬</span>
    <h2>Thank you for your feedback</h2>
    <p>We've received your message and will do our best to make things right.</p>
  </div>
</body>
</html>
